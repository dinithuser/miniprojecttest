<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>UCSC Slang Translator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Campus Slang Translator</h1>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="වචනයක් මෙතැන ටයිප් කරන්න...">
            <button onclick="searchWord()">සොයන්න</button>
        </div>
        <div id="resultArea" class="result-card">
            <p>ප්‍රතිඵල මෙහි පෙන්වනු ඇත.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
